name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Release readiness check
        run: npm run check:release

      - name: Build, validate, pack
        run: |
          npm run build
          npx streamdeck validate io.github.aguilarguisado.siestadeck.sdPlugin
          npx streamdeck pack io.github.aguilarguisado.siestadeck.sdPlugin --force

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: io.github.aguilarguisado.siestadeck.streamDeckPlugin
          generate_release_notes: true
