<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Self-contained dark banner so the README hero reads on both GitHub
       themes. Matches the in-app tile bg (#0F1115). Snooze-gauge mark on
       the left, tagline on the right — no wordmark. -->
  <rect width="480" height="120" rx="16" fill="#0F1115"/>

  <!-- Snooze-gauge mark (work-object + rest-object mashup: gauge + Z's). -->
  <svg x="24" y="20" width="80" height="80" viewBox="0 0 64 64">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 10 44 A 22 22 0 0 1 54 44" stroke="#F0F0EE" stroke-width="2.5"/>
      <line x1="10" y1="44" x2="13" y2="42" stroke="#F0F0EE" stroke-width="2"/>
      <line x1="20" y1="28" x2="22" y2="30" stroke="#F0F0EE" stroke-width="2"/>
      <line x1="32" y1="22" x2="32" y2="25" stroke="#F0F0EE" stroke-width="2"/>
      <line x1="44" y1="28" x2="42" y2="30" stroke="#F0F0EE" stroke-width="2"/>
      <line x1="54" y1="44" x2="51" y2="42" stroke="#F0F0EE" stroke-width="2"/>
      <line x1="32" y1="44" x2="48" y2="32" stroke="#D0776C" stroke-width="3.5"/>
      <circle cx="32" cy="44" r="3" fill="#F0F0EE"/>
      <path d="M 44 8 L 56 8 L 44 22 L 56 22" stroke="#D0776C" stroke-width="3"/>
    </g>
  </svg>

  <!-- Tagline next to the mark, vertically centered. "Time to" in ink-light,
       "siesta." in brand accent for a soft punch on the key phrase. -->
  <text x="124" y="72" font-family="'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="36" letter-spacing="-0.5"><tspan fill="#F0F0EE">Time to </tspan><tspan fill="#D0776C">siesta.</tspan></text>
</svg>
